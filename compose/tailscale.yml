# compose/tailscale.yml — Overlay for Tailscale deployment on mars (100.87.157.74)
#
# Usage:
#   docker compose --env-file compose/tailscale.env -f compose/dev.yml -f compose/tailscale.yml up -d
#
# What this overlay adds:
#   - restart: unless-stopped on all long-running services (survives reboots)
#   - Port remapping is handled by tailscale.env via env-var substitution in dev.yml
#   - kafka-init is intentionally excluded (one-shot container, must not restart)

name: rustbrain-dev

services:
  postgres:
    restart: unless-stopped

  neo4j:
    restart: unless-stopped

  qdrant:
    restart: unless-stopped

  kafka:
    restart: unless-stopped

  otel-collector:
    restart: unless-stopped

  tempo:
    restart: unless-stopped

  prometheus:
    restart: unless-stopped

  loki:
    restart: unless-stopped

  grafana:
    restart: unless-stopped

  ollama:
    restart: unless-stopped

  control-api:
    restart: unless-stopped
    # Mount a host-side model cache so fastembed downloads BGE-reranker-base once
    # and re-uses it across container recreations (ADR-014 §12 — self-hosted, no CDN).
    volumes:
      - /home/jarnura/models/rerank:/models/rerank

  caddy:
    restart: unless-stopped

  pgweb:
    restart: unless-stopped

  kafka-ui:
    restart: unless-stopped

  hindsight:
    restart: unless-stopped

  agent-runner:
    restart: unless-stopped

  ingest-clone:
    restart: unless-stopped

  ingest-graph:
    restart: unless-stopped

  parse-worker:
    restart: unless-stopped

  expand-worker:
    restart: unless-stopped

  typecheck-worker:
    restart: unless-stopped

  embed-worker:
    restart: unless-stopped

  projector-pg:
    restart: unless-stopped

  projector-neo4j:
    restart: unless-stopped

  tombstoner:
    restart: unless-stopped

  frontend:
    restart: unless-stopped

  claude-login:
    restart: unless-stopped
