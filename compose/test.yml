name: rustbrain-test

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rustbrain
      POSTGRES_PASSWORD: rustbrain
      POSTGRES_DB: rustbrain
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - rb-test-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustbrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: VGVzdENsdXN0ZXJJZEtleQ
      # KRaft metadata log hardening: limit snapshot interval, segment size, and tune
      # broker heartbeat/session timeouts for resilience under GC pressure.
      KAFKA_METADATA_LOG_MAX_SNAPSHOT_INTERVAL_MS: "300000"
      KAFKA_METADATA_LOG_SEGMENT_BYTES: "10485760"
      KAFKA_BROKER_HEARTBEAT_INTERVAL_MS: "2000"
      KAFKA_BROKER_SESSION_TIMEOUT_MS: "9000"
    volumes:
      - test_kafka_data:/var/lib/kafka/data
    ports:
      - "9093:9092"
    networks:
      - rb-test-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    networks:
      - rb-test-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  rb-test-net:
    driver: bridge

volumes:
  test_postgres_data:
  test_kafka_data:
