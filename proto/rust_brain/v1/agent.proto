syntax = "proto3";

package rust_brain.v1;

enum AgentRuntime {
  AGENT_RUNTIME_UNSPECIFIED = 0;
  AGENT_RUNTIME_CLAUDE_CODE = 1;
  AGENT_RUNTIME_OPENCODE = 2;
  AGENT_RUNTIME_PI = 3;
}

enum AgentSessionStatus {
  AGENT_SESSION_STATUS_UNSPECIFIED = 0;
  AGENT_SESSION_STATUS_PENDING = 1;
  AGENT_SESSION_STATUS_RUNNING = 2;
  AGENT_SESSION_STATUS_COMPLETED = 3;
  AGENT_SESSION_STATUS_FAILED = 4;
  AGENT_SESSION_STATUS_TERMINATED = 5;
}

enum AgentEventType {
  AGENT_EVENT_TYPE_UNSPECIFIED = 0;
  AGENT_EVENT_TYPE_SYSTEM = 1;
  AGENT_EVENT_TYPE_STDOUT = 2;
  AGENT_EVENT_TYPE_STDERR = 3;
  AGENT_EVENT_TYPE_TOOL_CALL = 4;
  AGENT_EVENT_TYPE_TOOL_RESULT = 5;
}

message AgentCommand {
  string tenant_id = 1;
  string event_id = 2;
  string session_id = 3;
  AgentRuntime runtime = 4;
  string input_prompt = 5;
  string workspace_path = 6;
  int64 created_at_ms = 7;
  string traceparent = 8;
  oneof command {
    SessionStart start = 10;
    SessionTerminate terminate = 11;
    SessionInput input = 12;
  }
}

message SessionStart {
  string api_key = 1;
}

message SessionTerminate {
  bool force = 1;
}

message SessionInput {
  string prompt = 1;
}

message AgentEvent {
  string tenant_id = 1;
  string event_id = 2;
  string session_id = 3;
  AgentEventType event_type = 4;
  string event_data_json = 5;
  int64 occurred_at_ms = 6;
  string trace_id = 7;
  string span_id = 8;
}

message SystemEventData {
  string message = 1;
  AgentSessionStatus status = 2;
}

message StdoutEventData {
  string line = 1;
}

message StderrEventData {
  string line = 1;
}

message ToolCallEventData {
  string tool_name = 1;
  string arguments_json = 2;
}

message ToolResultEventData {
  string tool_name = 1;
  bool success = 2;
  string result_json = 3;
  string error_message = 4;
}
