[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "ISC",
    "Zlib",
    "OpenSSL",
    # webpki-roots bundles Mozilla CA certificates under CDLA-Permissive-2.0
    "CDLA-Permissive-2.0",
    # quoted_printable (dep of lettre email transport) uses zero-clause BSD
    "0BSD",
]
confidence-threshold = 0.8

[advisories]
version = 2
ignore = [
    # rustls-pemfile: unmaintained, no safe upgrade available — transitive via neo4rs
    { id = "RUSTSEC-2025-0134" },
    # backoff: unmaintained, no safe upgrade available
    { id = "RUSTSEC-2025-0012" },
    # instant: unmaintained, no safe upgrade available — transitive via various crates
    { id = "RUSTSEC-2024-0384" },
    # paste: unmaintained, no safe upgrade available
    { id = "RUSTSEC-2024-0436" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
