server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS resolver. valid=10s causes nginx to re-resolve
    # after 10 s rather than caching the IP for the container lifetime.
    # Combined with the $upstream variable below, this prevents 502s when
    # control-api is recreated and assigned a new bridge IP by the watcher.
    resolver 127.0.0.11 valid=10s;

    # Proxy API, health, and readiness endpoints to control-api
    location /v1/ {
        set $upstream control-api:8080;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        set $upstream control-api:8080;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /ready {
        set $upstream control-api:8080;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # index.html must always revalidate so deploys are immediately visible.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # Content-hashed assets are immutable — safe to cache forever.
    # Vite outputs filenames like index-CoKgYETv.js; a new deploy changes the
    # hash, the new HTML references the new name, so the old entry is never hit.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback: unknown paths serve index.html with the same no-cache rule.
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
