global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts/*.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  - job_name: control-api
    static_configs:
      - targets: ['control-api:8080']
    metrics_path: /metrics

  - job_name: worker-services
    static_configs:
      - targets:
          - 'agent-runner:9091'
          - 'audit-worker:9091'
          - 'embed-worker:9091'
          - 'expand-worker:9091'
          - 'ingest-clone:9091'
          - 'ingest-graph:9091'
          - 'parse-worker:9091'
          - 'projector-neo4j:9091'
          - 'projector-pg:9091'
          - 'tombstoner:9091'
          - 'typecheck-worker:9091'
    metrics_path: /metrics
