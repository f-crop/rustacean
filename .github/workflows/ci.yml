name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Path filter (drives conditional jobs) ─────────────────────────────────

  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      # JSON array of image names whose filter matched changed files. The
      # docker-build matrix expands this with fromJson(); an empty array
      # skips the matrix job entirely.
      images: ${{ steps.compute.outputs.images }}
      retrieval-eval: ${{ steps.filter.outputs.retrieval-eval }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # YAML anchor `workspace` is the conservative bucket: anything that
          # could change the dep graph for every Rust image. Each per-image
          # filter starts with *workspace, then adds its own service + docker
          # paths. A pure source-only change under `services/<x>/**` matches
          # only that image, not the others.
          filters: |
            workspace: &workspace
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'crates/**'
              - 'proto/**'
              - '.github/workflows/ci.yml'
            agent-runner:
              - *workspace
              - 'services/agent-runner/**'
              - 'docker/agent-runner/**'
            control-api:
              - *workspace
              - 'services/control-api/**'
              - 'services/migrate/**'
              - 'docker/control-api/**'
              - 'migrations/**'
            embed-worker:
              - *workspace
              - 'services/embed-worker/**'
              - 'docker/embed-worker/**'
            expand-worker:
              - *workspace
              - 'services/expand-worker/**'
              - 'docker/expand-worker/**'
            frontend:
              - 'frontend/**'
              - 'docker/frontend/**'
              - '.github/workflows/ci.yml'
            ingest-clone:
              - *workspace
              - 'services/ingest-clone/**'
              - 'docker/ingest-clone/**'
            ingest-graph:
              - *workspace
              - 'services/ingest-graph/**'
              - 'docker/ingest-graph/**'
            parse-worker:
              - *workspace
              - 'services/parse-worker/**'
              - 'docker/parse-worker/**'
            projector-neo4j:
              - *workspace
              - 'services/projector-neo4j/**'
              - 'docker/projector-neo4j/**'
            projector-pg:
              - *workspace
              - 'services/projector-pg/**'
              - 'docker/projector-pg/**'
            tombstoner:
              - *workspace
              - 'services/tombstoner/**'
              - 'docker/tombstoner/**'
            typecheck-worker:
              - *workspace
              - 'services/typecheck-worker/**'
              - 'docker/typecheck-worker/**'
            synthetic-load:
              - *workspace
              - 'services/synthetic-load/**'
              - 'docker/synthetic-load/**'
            retrieval-eval:
              - 'crates/rb-query/**'
              - 'crates/rb-rerank/**'
              - 'crates/rb-schemas/**'
              - 'services/control-api/src/routes/query/**'
              - 'services/control-api/src/routes/mcp/**'
              - 'migrations/tenant/**'
              - 'docs/retrieval-eval/**'
              - 'scripts/eval-retrieval.py'
      - id: compute
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          CHANGED: ${{ steps.filter.outputs.changes }}
        run: |
          set -euo pipefail
          ALL='["agent-runner","control-api","embed-worker","expand-worker","frontend","ingest-clone","ingest-graph","parse-worker","projector-neo4j","projector-pg","tombstoner","typecheck-worker","synthetic-load"]'
          # On push-to-main, always build every image so :sha-<sha> tags exist
          # for every service. The path filter is only an optimisation for PRs.
          if [ "$EVENT" = "push" ] && [ "$REF" = "refs/heads/main" ]; then
            echo "images=$ALL" >> "$GITHUB_OUTPUT"
            echo "Selected images: ALL (push to main)"
          else
            # Strip the `workspace` meta-filter — it has no docker/workspace/
            # image, only exists as the shared anchor included by every Rust
            # image's filter. jq drops it cleanly.
            SELECTED="$(printf '%s' "${CHANGED:-[]}" | jq -c '. - ["workspace"]')"
            echo "images=$SELECTED" >> "$GITHUB_OUTPUT"
            echo "Selected images: $SELECTED"
          fi

  # ── Required-check Rust jobs (ADR-012 §S5.2, checks 1-5) ─────────────────

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rdkafka
      - run: cargo build --workspace --all-targets

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rdkafka
      - run: cargo test --workspace

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rdkafka
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check license / ban / source policies
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

  # ── Script-backed jobs ─────────────────────────────────────────────────────

  file-size:
    name: file size (600-line cap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-file-sizes.sh

  public-surface:
    name: public surface lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bash scripts/check-pub-use.sh

  openapi-sync:
    name: openapi sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rdkafka
      - run: bash scripts/check-openapi-sync.sh

  codegen-drift:
    name: codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rdkafka
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build control-api binary
        run: cargo build -p control-api --quiet
      - name: Regenerate openapi.json in place
        run: ./target/debug/control-api print-openapi > openapi.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Regenerate frontend schema in place
        working-directory: frontend
        run: npm run gen:api
      - name: Detect drift via git diff
        run: |
          if ! git diff --exit-code openapi.json frontend/src/api/generated/schema.ts; then
            echo ""
            echo "::error::Generated artefacts are stale. Run the following commands and commit the result:"
            echo "::error::  cargo run -p control-api -- print-openapi > openapi.json"
            echo "::error::  cd frontend && npm run gen:api"
            exit 1
          fi

  # Required-check frontend jobs (ADR-012 §S5.2, checks 6-7) ─────────────────

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend bundle
        run: npm run build

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generated types match openapi.json
        run: npm run gen:api:check
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  # ── Dependency graph & policy ──────────────────────────────────────────────

  crate-cycle:
    name: crate cycle check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate workspace dependency graph (cycles = cargo-check fail)
        run: cargo metadata --format-version 1 --no-deps > /dev/null

  # ── Security ───────────────────────────────────────────────────────────────

  security-lint:
    name: security lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo audit
        uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Reviewer checklist ────────────────────────────────────────────────────

  review-checklist:
    name: reviewer checklist (semantic catches)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rdkafka
      - name: Run reviewer checklist (skip docker smoke in CI)
        run: SKIP_DOCKER=1 WAIVER_FILE=tests/review-checklist/baseline-waivers.txt make review-checklist

  review-checklist-fixtures:
    name: reviewer checklist fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run checker fixture tests (PASS/FAIL logic verification)
        run: make review-checklist-fixtures

  # ── Stub jobs (wired in later waves) ──────────────────────────────────────

  docker-build:
    name: docker build + push (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: changes
    # Skip the matrix entirely when no image filter matched. fromJson('[]')
    # produces an empty matrix and GHA would still spawn a no-op job, so we
    # guard with an explicit if.
    if: needs.changes.outputs.images != '[]' && needs.changes.outputs.images != ''
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.changes.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.image }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # Tag every image on main with both :dev (rolling) and :sha-<sha>
          # (deterministic). PRs only build locally — no push, no tag drift.
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:dev
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:sha-${{ github.sha }}
          # Per-image GHA cache scope so concurrent matrix entries do not
          # stomp each other's dependency layers.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  frontend-e2e:
    name: frontend e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Build frontend bundle
        run: npm run build
        env:
          VITE_TEMPO_URL: http://localhost:3200
      - name: Run Playwright E2E tests
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30

  rb-feature-resolver-isolation:
    name: rb-feature-resolver isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check zero rb-* deps in rb-feature-resolver
        run: bash scripts/check-rb-feature-resolver-isolation.sh

  forbid-direct-neo4j-writes:
    name: forbid-direct-neo4j-writes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject neo4rs imports outside rb-storage-neo4j
        run: |
          matches=$(grep -rn --include="*.rs" "neo4rs" . \
            | grep -v "^\./crates/rb-storage-neo4j/" \
            | grep -v "^Binary" || true)
          if [ -n "$matches" ]; then
            echo "ERROR: Direct neo4rs usage outside crates/rb-storage-neo4j:"
            echo "$matches"
            echo ""
            echo "All Neo4j access MUST go through rb_storage_neo4j::execute() or ::run()."
            exit 1
          fi
          echo "OK: no direct neo4rs imports outside rb-storage-neo4j"

  tenant-isolation:
    name: tenant isolation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rustbrain
          POSTGRES_PASSWORD: rustbrain
          POSTGRES_DB: rustbrain
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://rustbrain:rustbrain@localhost:5432/rustbrain
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cross-tenant row count must be zero
        run: cargo test -p rb-storage-pg --test integration --test routing

  retrieval-eval:
    name: retrieval eval (nDCG@10 regression gate)
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.retrieval-eval == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run retrieval eval
        run: python3 scripts/eval-retrieval.py --mode ci
