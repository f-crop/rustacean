name: Runtime Smoke

# Required check: "runtime-smoke" (ADR-012 §S5.2, check #12).
# Always runs on PRs so the required check is always reported.
# Build/probe steps are skipped when no relevant files changed; the job still
# exits 0 so the required check passes on docs-only PRs.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job name IS the required-check name registered in branch protection.
  runtime-smoke:
    name: runtime-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Detect whether this PR touches build-relevant files.
      # When nothing relevant changed the job exits early (pass) so the required
      # check is always reported without running a 15-minute Docker build.
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            build:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**/Cargo.toml'
              - 'crates/rb-build-info/**'
              - 'services/**/Cargo.toml'
              - 'services/**/build.rs'
              - 'docker/**'
              - 'compose/**'
              - '.github/workflows/runtime-smoke.yml'
              - 'scripts/apply-branch-protection.sh'

      - name: Skip — no build-relevant files changed
        if: steps.changes.outputs.build != 'true'
        run: echo "No build-relevant files changed — skipping Docker smoke."

      - name: Set up Docker Buildx
        if: steps.changes.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      # Build the release image from the PR's own Dockerfile.
      # cache-from/to reuse layer cache across runs for faster builds.
      # GIT_SHA is passed so the binary has compile-time provenance baked in;
      # the SHA-assertion step below verifies the bake succeeded.
      - name: Build control-api image
        if: steps.changes.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/control-api/Dockerfile
          load: true
          tags: control-api:smoke
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Probe: run the binary with --version, expect exit 0 + semver output
      # within 5 s.  Any shared-library error (libz, GLIBC version mismatch)
      # surfaces here before the image reaches UAT.
      - name: Probe binary start (5 s timeout)
        if: steps.changes.outputs.build == 'true'
        run: |
          set -euo pipefail

          output=$(timeout 5s \
            docker run --rm \
              --entrypoint /usr/local/bin/control-api \
              control-api:smoke \
              --version 2>&1) || {
            rc=$?
            echo "::error::control-api binary probe exited $rc (non-zero or timeout >5 s)"
            echo "$output"
            exit 1
          }

          echo "$output"

          # Hard-fail on known runtime linker error patterns.
          if echo "$output" | grep -qiE \
              'error while loading shared libraries|GLIBC_[0-9]+\.[0-9]+ not found|libz\.so'; then
            echo "::error::Runtime linker error detected — image is missing a shared library"
            exit 1
          fi

          # Must emit at least one semver-like token (e.g. "0.1.0").
          if ! echo "$output" | grep -qE '[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::--version output did not contain a semver string: $output"
            exit 1
          fi

          echo "Smoke PASSED: $output"

      # Build-provenance gate: assert the SHA baked into the binary matches
      # the PR's HEAD commit.  Catches stale Docker layer-cache bugs where the
      # binary silently ships with the wrong SHA.
      - name: Assert build SHA == github.sha
        if: steps.changes.outputs.build == 'true'
        run: |
          set -euo pipefail

          build_json=$(timeout 5s \
            docker run --rm \
              --entrypoint /usr/local/bin/control-api \
              control-api:smoke \
              build-info 2>&1) || {
            rc=$?
            echo "::error::control-api build-info exited $rc"
            echo "$build_json"
            exit 1
          }

          echo "build-info output: $build_json"

          binary_sha=$(echo "$build_json" | python3 -c \
            "import json,sys; print(json.load(sys.stdin)['sha'])")

          expected="${{ github.sha }}"

          if [[ "$binary_sha" != "$expected" ]]; then
            echo "::error::SHA mismatch — binary=$binary_sha expected=$expected"
            echo "The binary was compiled with a different SHA than the PR HEAD."
            echo "This usually means the Docker layer cache served a stale build."
            exit 1
          fi

          echo "SHA match confirmed: $binary_sha"

      # Branch-protection drift check (ADR-012 §S5.3).
      # Reads the live branch protection and verifies all 12 required checks
      # from scripts/apply-branch-protection.sh are still bound.
      # Gracefully skips if the API is unavailable (fork PRs, permission limits).
      - name: Branch-protection drift check
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EXPECTED=$(bash scripts/apply-branch-protection.sh --list 2>/dev/null) || {
            echo "::warning::Could not read required-checks list from script — skipping drift check."
            exit 0
          }

          LIVE=$(gh api repos/${{ github.repository }}/branches/main/protection \
            --jq '.required_status_checks.contexts[]' 2>/dev/null | sort) || {
            echo "::warning::Could not read live branch protection (permission/API issue) — skipping drift check."
            exit 0
          }

          MISSING=""
          while IFS= read -r check; do
            [[ -z "$check" ]] && continue
            if ! echo "$LIVE" | grep -qxF "$check"; then
              MISSING="${MISSING}  - ${check}\n"
            fi
          done <<< "$EXPECTED"

          if [[ -n "$MISSING" ]]; then
            echo "::error::Branch protection drift detected. The following required checks are declared in"
            echo "::error::scripts/apply-branch-protection.sh but NOT bound in the live branch protection:"
            printf "%b" "$MISSING"
            echo "::error::Run: make apply-branch-protection"
            exit 1
          fi

          echo "Branch protection check: all required checks are bound."

  # ── Worker services: build-provenance smoke gate ──────────────────────────
  # One job per service; each builds the image, probes binary start, and
  # asserts that the SHA baked in at compile time matches github.sha.
  # Advisory only — not a required check. Only runs when relevant files change.
  worker-smoke:
    name: worker-smoke (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: parse-worker
            binary: parse-worker
          - service: typecheck-worker
            binary: typecheck-worker
          - service: ingest-graph
            binary: ingest-graph
          - service: ingest-clone
            binary: ingest-clone
          - service: expand-worker
            binary: expand-worker
          - service: embed-worker
            binary: embed-worker
          - service: projector-pg
            binary: projector-pg
          - service: projector-neo4j
            binary: projector-neo4j
          - service: tombstoner
            binary: tombstoner
          - service: agent-runner
            binary: rb-agent-runner

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            relevant:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'services/${{ matrix.service }}/**'
              - 'docker/${{ matrix.service }}/**'

      - name: Skip — no relevant files changed
        if: steps.changes.outputs.relevant != 'true'
        run: echo "No relevant files for ${{ matrix.service }} — skipping."

      - name: Set up Docker Buildx
        if: steps.changes.outputs.relevant == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        if: steps.changes.outputs.relevant == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          load: true
          tags: ${{ matrix.service }}:smoke
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Probe binary start (5 s timeout)
        if: steps.changes.outputs.relevant == 'true'
        run: |
          set -euo pipefail

          output=$(timeout 5s \
            docker run --rm \
              --entrypoint /usr/local/bin/${{ matrix.binary }} \
              ${{ matrix.service }}:smoke \
              --version 2>&1) || {
            rc=$?
            echo "::error::${{ matrix.service }} binary probe exited $rc (non-zero or timeout >5 s)"
            echo "$output"
            exit 1
          }

          echo "$output"

          if echo "$output" | grep -qiE \
              'error while loading shared libraries|GLIBC_[0-9]+\.[0-9]+ not found|libz\.so'; then
            echo "::error::Runtime linker error detected in ${{ matrix.service }}"
            exit 1
          fi

          if ! echo "$output" | grep -qE '[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::--version output did not contain a semver string: $output"
            exit 1
          fi

          echo "Smoke PASSED: $output"

      - name: Assert build SHA == github.sha
        if: steps.changes.outputs.relevant == 'true'
        run: |
          set -euo pipefail

          build_json=$(timeout 5s \
            docker run --rm \
              --entrypoint /usr/local/bin/${{ matrix.binary }} \
              ${{ matrix.service }}:smoke \
              build-info 2>&1) || {
            rc=$?
            echo "::error::${{ matrix.service }} build-info exited $rc"
            echo "$build_json"
            exit 1
          }

          echo "build-info output: $build_json"

          binary_sha=$(echo "$build_json" | python3 -c \
            "import json,sys; print(json.load(sys.stdin)['sha'])")

          expected="${{ github.sha }}"

          if [[ "$binary_sha" != "$expected" ]]; then
            echo "::error::SHA mismatch in ${{ matrix.service }} — binary=$binary_sha expected=$expected"
            exit 1
          fi

          echo "SHA match confirmed: $binary_sha"
